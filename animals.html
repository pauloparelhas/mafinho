<!DOCTYPE html>
<html lang="pt" data-theme="light" data-country="br">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"/>
<title>Animais — Mafinho v2</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap"
      rel="stylesheet" media="print" onload="this.media='all'"/>
<link rel="stylesheet" href="base.css"/>
<style>
/* ═══════════════════════════════════════════
   CSS ESPECÍFICO — animals.html
═══════════════════════════════════════════ */

/* Hub: cor do tópico Animais */
.hub-hero { border-bottom-color:var(--c-green); }
.game-card.ready { border-color:var(--c-green); }

/* ── TELA C: Flashcard ── */
#sFlash {
  flex:1; display:none; flex-direction:column;
  align-items:center; padding:20px 16px 32px; gap:0;
}
.card-row   { display:flex; align-items:center; gap:14px; width:100%; max-width:520px; }
.card-scene { flex:1; height:320px; perspective:1000px; min-width:0; }
.card-3d {
  width:100%; height:100%; position:relative;
  transform-style:preserve-3d; transition:transform .5s;
  cursor:pointer; border-radius:28px;
}
.card-3d.flipped { transform:rotateY(180deg); }
.card-face {
  position:absolute; inset:0;
  backface-visibility:hidden; -webkit-backface-visibility:hidden;
  border-radius:28px; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:14px; padding:24px;
}
.card-back  { transform:rotateY(180deg); background:var(--surface); border:5px solid var(--border); }
.card-emoji      { font-size:7rem; line-height:1; user-select:none; }
.card-emoji svg  { width:140px; height:140px; }
.click-opt svg   { width:80px; height:80px; }

@media (min-width:600px) {
  .card-emoji svg  { width:200px; height:200px; }
  .click-opt       { width:140px; height:140px; }
  .click-opt svg   { width:100px; height:100px; }
}
@media (min-width:1024px) {
  .card-emoji svg  { width:240px; height:240px; }
  .card-scene      { height:400px; }
  .click-opt       { width:170px; height:170px; }
  .click-opt svg   { width:120px; height:120px; }
}
.card-tap-hint   { font-size:var(--sm); font-weight:700; opacity:0.75; text-align:center; color:inherit; }
.card-back-name  { font-size:3rem; font-weight:900; text-align:center; line-height:1.1; }
.flash-progress { font-size:var(--sm); font-weight:800; color:var(--muted); text-align:center; margin-top:16px; }
#sFlash .card-nav { max-width:520px; }
#sFlash .progress-bar-wrap { max-width:520px; }

/* ── TELA D: Clicar ── */
#sClick {
  flex:1; display:none; flex-direction:column;
  align-items:center; padding:12px 12px 8px; gap:10px;
}
#sClick .back-link { margin-bottom:0; }
.click-instruction {
  font-size:var(--xl); font-weight:900; text-align:center;
  color:var(--country-accent);
}
.click-options {
  display:flex; gap:14px; justify-content:center;
  width:100%; max-width:420px;
}
.click-opt {
  width:110px; height:110px; border:none; border-radius:var(--radlg);
  font-size:4.5rem; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  background:var(--surface); border:4px solid var(--border);
  box-shadow:0 4px 16px rgba(0,0,0,0.15);
  position:relative; overflow:hidden;
  -webkit-tap-highlight-color:transparent;
  transition:transform .12s;
}
.click-opt:active { transform:scale(0.94); }
.click-opt .x-overlay {
  position:absolute; inset:0; background:rgba(0,0,0,0.55);
  display:flex; align-items:center; justify-content:center;
  font-size:3rem; color:white; border-radius:inherit;
  opacity:0; pointer-events:none;
}
@keyframes xShake {
  0%  { transform:translate(0,0) rotate(0deg);   opacity:1; }
  15% { transform:translate(-10px,0) rotate(-7deg); }
  30% { transform:translate(10px,0)  rotate(7deg);  }
  45% { transform:translate(-8px,0)  rotate(-5deg); }
  60% { transform:translate(8px,0)   rotate(5deg);  }
  75% { transform:translate(-4px,0)  rotate(-2deg); }
  88% { opacity:1; }
  100%{ transform:translate(0,0) rotate(0deg); opacity:0; }
}
.click-opt.wrong .x-overlay { opacity:1; animation:xShake .7s ease; }
.click-round { font-size:var(--sm); font-weight:800; color:var(--muted); }

</style>
</head>
<body>

<div class="theme-stripe"></div>
<span class="corner-deco tl" id="dc1">⭐</span>
<span class="corner-deco tr" id="dc2">⭐</span>
<span class="corner-deco bl" id="dc3">⭐</span>
<span class="corner-deco br" id="dc4">⭐</span>

<!-- ═══ NAVBAR ═══ -->
<nav class="navbar">
  <a id="navLogo" href="#" class="nav-btn btn-home" onclick="MF.confirmHome(event)" title="Início">🏠</a>
  <span class="nav-title">🐾 <span id="navTitle">Animais</span></span>
  <button class="nav-lang-badge" id="navLangBadge" onclick="Nav.backToLang()" style="display:none;">🇧🇷 PT</button>
  <button class="nav-btn btn-theme" id="btnTheme" onclick="MF.toggleTheme()" title="Tema">🌙</button>
  <button class="nav-btn btn-sound" id="btnSound" onclick="MF.toggleSound()" title="Som">🔊</button>
  <button class="nav-btn btn-lock"  id="btnLock"  onclick="MF.handleLock()"  title="Travar">🔒</button>
</nav>

<!-- ═══ TELA A: Hub ═══ -->
<div id="sHub">
  <div class="hub-hero">
    <span class="hub-hero-icon">🐾</span>
    <h1>Animais</h1>
    <p id="hubSub">Conheça os animais!</p>
  </div>
  <div class="hub-grid">
    <div class="game-card ready" onclick="Nav.goLang('flash')">
      <span class="g-icon">💡</span>
      <span class="g-title" id="hubFlash">Flashcards</span>
      <span class="g-badge badge-ready" id="badgeFlash">Disponível</span>
    </div>
    <div class="game-card ready" onclick="Nav.goLang('click')">
      <span class="g-icon">🎯</span>
      <span class="g-title" id="hubClicar">Clicar</span>
      <span class="g-badge badge-ready" id="badgeClicar">Disponível</span>
    </div>
  </div>
</div>

<!-- ═══ TELA B: Idioma ═══ -->
<div id="sLang">
  <div class="lang-intro">
    <h1>🐾 Mafinho Explora!</h1>
    <p>Escolha o idioma · Choose the language</p>
  </div>
  <div class="lang-cards">
    <button class="lang-card lang-card-br" onclick="Nav.startGame('pt')">
      <span class="lang-flag">🇧🇷</span>
      <span class="lang-name">Português</span>
      <span class="lang-sub">Brasil</span>
    </button>
    <button class="lang-card lang-card-ca" onclick="Nav.startGame('en')">
      <span class="lang-flag">🇨🇦</span>
      <span class="lang-name">English</span>
      <span class="lang-sub">Canada</span>
    </button>
  </div>
</div>

<!-- ═══ TELA C: Flashcard ═══ -->
<div id="sFlash">
  <button class="back-link" onclick="Nav.backToHub()">← <span id="flashBackLabel">Animais</span></button>
  <div class="card-row">
    <div class="card-scene">
      <div class="card-3d" id="flashCard3d" onclick="FlashGame.flip()">
        <div class="card-face" id="flashFront" style="color:white;">
          <span class="card-emoji" id="flashEmoji">🐶</span>
          <span class="card-tap-hint" id="flashTapHint">Quem é?</span>
        </div>
        <div class="card-face card-back">
          <span class="card-emoji" id="flashBackEmoji">🐶</span>
          <span class="card-back-name" id="flashName">Cachorro</span>
        </div>
      </div>
    </div>
    <button class="btn-speak-side" id="flashSpeak" onclick="TTS.replay()">🔊</button>
  </div>
  <div class="card-nav">
    <button class="btn-nav btn-prev" id="flashPrev" onclick="FlashGame.prev()">◀</button>
    <button class="btn-nav btn-next" id="flashNext" onclick="FlashGame.next()">▶</button>
  </div>
  <div class="flash-progress" id="flashProgress">1 / 10</div>
  <div class="progress-bar-wrap">
    <div class="progress-bar" id="flashBar" style="width:10%"></div>
  </div>
</div>

<!-- ═══ TELA D: Clicar ═══ -->
<div id="sClick">
  <button class="back-link" onclick="Nav.backToHub()">← <span id="clickBackLabel">Animais</span></button>
  <p class="click-instruction" id="clickInstruction">Qual é o cachorro?</p>
  <div class="click-options" id="clickOptions"></div>
  <p class="click-round" id="clickRoundBadge"></p>
</div>


<!-- ═══ TELA F: Celebração ═══ -->
<div id="sCelebrate">
  <div class="stars">⭐⭐⭐⭐⭐</div>
  <div class="cel-emoji">🎉</div>
  <div class="cel-title" id="celTitle">Muito bem!</div>
  <div class="cel-sub" id="celSub">Você conhece todos os animais!</div>
  <button class="btn-big" onclick="Nav.restartGame()" id="btnRestart">Recomeçar 🔄</button>
  <button class="btn-mid" onclick="Nav.backToHub()" id="btnBackHub">← Animais</button>
</div>

<!-- Toast encorajamento -->
<div class="enc-toast" id="encToast">⭐ Muito bem!</div>

<!-- Banner ativar som -->
<button class="sound-banner" id="soundBanner" onclick="TTS.activate()">
  🔊 Toque aqui para ativar o som!
</button>

<!-- Overlay: travar tela -->
<div class="mf-overlay" id="lockOverlay">
  <div class="mf-modal">
    <div class="mf-modal-icon">🔒</div>
    <div class="mf-modal-msg">Desbloquear tela?</div>
    <div class="mf-modal-btns">
      <button class="mf-btn-yes" onclick="MF._unlock()">✅ Sim</button>
      <button class="mf-btn-no"  onclick="document.getElementById('lockOverlay').classList.remove('show')">❌ Não</button>
    </div>
  </div>
</div>
<!-- Overlay: menu de navegação (conteúdo gerado por base.js) -->
<div class="mf-overlay" id="homeOverlay"></div>

<script src="base.js"></script>

Nav.startGame = function(lang) {
  this._applyLang(lang);
  document.getElementById('navLangBadge').style.display = '';
  if (this.currentGame === 'flash') {
    this._show('sFlash');
    FlashGame.start(lang);
  } else if (this.currentGame === 'click') {
    this._show('sClick');
    ClickGame.start(lang);
  }
};

Nav.restartGame = function() {
  document.getElementById('sCelebrate').classList.remove('show');
  if (this.currentGame === 'flash') {
    this._show('sFlash');
    FlashGame.start(FlashGame.lang);
  } else if (this.currentGame === 'click') {
    this._show('sClick');
    ClickGame.start(ClickGame.lang);
  }
};

  const L = LANG[lang];
  const set = (id, txt) => { const el = document.getElementById(id); if (el) el.textContent = txt; };
  document.documentElement.dataset.country = L.country;
  document.documentElement.lang = lang === 'pt' ? 'pt-BR' : 'en';
  set('navTitle',       L.navTitle);
  set('navLangBadge',   L.navBadge);
  set('hubSub',         L.hubSub);
  set('hubFlash',       L.hubFlash);
  set('badgeFlash',     L.badgeFlash);
  set('hubClicar',      L.hubClicar);
  set('badgeClicar',    L.badgeClicar);
  set('flashBackLabel', L.flashBackLabel);
  set('flashTapHint',   L.flashTapHint);
  set('clickBackLabel', L.clickBackLabel);
  set('btnRestart',     L.restart);
  set('btnBackHub',     L.backHub);
  this._setCorners(L.corners);
  TTS.setLang(L.tts);
};

/* ═══════════════════════════════════════════════
   FLASH GAME — Flashcard de animais
═══════════════════════════════════════════════ */
const FlashGame = {
  lang:'pt', step:0, flipped:false, encCount:0,

  start(lang) {
    this.lang = lang;
    this.step = 0;
    this.flipped = false;
    this.encCount = 0;
    TTS.init();
    this._render();
  },

  _render() {
    const a     = ANIMALS[this.step];
    const color = ANIMAL_COLORS[this.step];
    const L     = LANG[this.lang];
    const name  = this.lang === 'pt' ? a.pt : a.en;

    const svg = ANIMAL_SVGS[this.step];
    document.getElementById('flashCard3d').classList.toggle('flipped', this.flipped);
    document.getElementById('flashFront').style.background = color;
    document.getElementById('flashEmoji').innerHTML = svg;
    document.getElementById('flashBackEmoji').innerHTML = svg;
    document.getElementById('flashName').textContent = name;

    const total = ANIMALS.length;
    document.getElementById('flashProgress').textContent = (this.step + 1) + ' / ' + total;
    document.getElementById('flashBar').style.width = (((this.step + 1) / total) * 100) + '%';
    document.getElementById('flashPrev').disabled = this.step === 0;

    TTS.speak(L.flashQuestion);
  },

  flip() {
    this.flipped = !this.flipped;
    document.getElementById('flashCard3d').classList.toggle('flipped', this.flipped);
    if (this.flipped) {
      const a    = ANIMALS[this.step];
      const name = this.lang === 'pt' ? a.pt : a.en;
      SFX.playCorrect();
      TTS.speakExcitedAndWait(name + '!');
      this.encCount++;
      if (this.encCount % 3 === 0) {
        const enc = LANG[this.lang].encourage[Math.floor(Math.random() * LANG[this.lang].encourage.length)];
        this._encourage(enc);
      }
    } else {
      TTS.speak(LANG[this.lang].flashQuestion);
    }
  },

  next() {
    speechSynthesis && speechSynthesis.cancel();
    if (this.step >= ANIMALS.length - 1) { this._celebrate(); return; }
    this.step++; this.flipped = false; this._render();
  },

  prev() {
    if (this.step <= 0) return;
    speechSynthesis && speechSynthesis.cancel();
    this.step--; this.flipped = false; this._render();
  },

  _celebrate() {
    const L = LANG[this.lang];
    speechSynthesis && speechSynthesis.cancel();
    setTimeout(() => TTS.speak(L.flashCelSpoken), 400);
    document.getElementById('celTitle').textContent   = L.celTitle;
    document.getElementById('celSub').textContent     = L.flashCelSub;
    document.getElementById('btnRestart').textContent = L.restart;
    document.getElementById('btnBackHub').textContent = L.backHub;
    localStorage.setItem('animals_flash_progresso', JSON.stringify({
      completed:true, date:new Date().toISOString()
    }));
    Nav._show('sCelebrate');
  },

  _encourage(enc) {
    const t = document.getElementById('encToast');
    t.textContent = enc.text;
    t.classList.add('show');
    setTimeout(() => TTS.speak(enc.spoken), 1400);
    setTimeout(() => t.classList.remove('show'), 3200);
  }
};

/* ═══════════════════════════════════════════════
   CLICK GAME — Qual é o animal?
═══════════════════════════════════════════════ */
const ClickGame = {
  lang:'pt', sequence:[], step:0, totalSteps:5, _locked:false,

  start(lang) {
    this.lang = lang;
    this.step = 0;
    this._locked = false;
    this.sequence = shuffle([...Array(ANIMALS.length).keys()]).slice(0, this.totalSteps);
    TTS.init();
    this._render();
  },

  _render() {
    const targetIdx = this.sequence[this.step];
    const target    = ANIMALS[targetIdx];
    const L         = LANG[this.lang];
    const name      = this.lang === 'pt' ? target.pt : target.en;

    document.getElementById('clickRoundBadge').textContent =
      (this.step + 1) + ' / ' + this.totalSteps;

    /* Gênero correto em PT: "Qual é o cachorro?" vs "Qual é a vaca?" */
    let instruction, spoken;
    if (this.lang === 'pt') {
      instruction = 'Qual é ' + target.gen + ' ' + name + '?';
      spoken      = 'Qual é ' + target.gen + ' ' + name;
    } else {
      instruction = L.clickCmd + ' ' + name + '?';
      spoken      = L.clickCmd + ' ' + name;
    }
    document.getElementById('clickInstruction').textContent = instruction;

    const pool = [...Array(ANIMALS.length).keys()].filter(i => i !== targetIdx);
    const opts = shuffle([targetIdx, ...shuffle(pool).slice(0, 2)]);

    const optionsEl = document.getElementById('clickOptions');
    optionsEl.innerHTML = '';
    opts.forEach(ai => {
      const btn = document.createElement('button');
      btn.className = 'click-opt';
      btn.innerHTML = ANIMAL_SVGS[ai];

      const xOv = document.createElement('span');
      xOv.className = 'x-overlay';
      xOv.textContent = '✖';
      btn.appendChild(xOv);

      btn.addEventListener('click', () => {
        if (this._locked) return;
        if (ai === targetIdx) this._onCorrect(targetIdx);
        else                  this._onWrong(btn);
      });
      optionsEl.appendChild(btn);
    });

    setTimeout(() => TTS.speak(spoken), 250);
  },

  _onCorrect(idx) {
    this._locked = true;
    const L    = LANG[this.lang];
    const name = this.lang === 'pt' ? ANIMALS[idx].pt : ANIMALS[idx].en;
    const enc  = L.encourage[Math.floor(Math.random() * L.encourage.length)];
    SFX.playCorrect();
    const t = document.getElementById('encToast');
    t.textContent = enc.text;
    t.classList.add('show');
    setTimeout(() => TTS.speak(name + '! ' + enc.spoken), 200);
    setTimeout(() => t.classList.remove('show'), 3800);
    setTimeout(() => {
      this._locked = false;
      this.step++;
      if (this.step >= this.totalSteps) this._celebrate();
      else                              this._render();
    }, 3500);
  },

  _onWrong(btn) {
    SFX.playWrong();
    btn.classList.add('wrong');
    setTimeout(() => btn.classList.remove('wrong'), 720);
  },

  _celebrate() {
    const L = LANG[this.lang];
    speechSynthesis && speechSynthesis.cancel();
    setTimeout(() => TTS.speak(L.clickCelSpoken), 400);
    document.getElementById('celTitle').textContent   = L.celTitle;
    document.getElementById('celSub').textContent     = L.clickCelSub;
    document.getElementById('btnRestart').textContent = L.restart;
    document.getElementById('btnBackHub').textContent = L.backHub;
    localStorage.setItem('animals_click_progresso', JSON.stringify({
      completed:true, date:new Date().toISOString()
    }));
    Nav._show('sCelebrate');
  },
};

/* ── BOOT ── */
MF.currentGameId = 'animals';
Nav.boot(['sHub','sLang','sFlash','sClick','sCelebrate']);
