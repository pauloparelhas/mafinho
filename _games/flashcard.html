<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Flashcard – Mafinho</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet"/>
<style>
:root {
  --c-red:#E53935; --c-blue:#1E88E5; --c-yellow:#F9A825;
  --c-green:#43A047; --c-orange:#FB8C00; --c-purple:#8E24AA;
  --c-pink:#E91E63; --c-teal:#00897B;
  --bg:#F8F9FA; --surface:#FFFFFF; --sur2:#F1F3F5;
  --text:#212121; --muted:#757575; --border:#DEE2E6; --shadow:rgba(0,0,0,0.12);
  --fs:1; --sm:calc(1.2rem*var(--fs)); --md:calc(1.55rem*var(--fs));
  --lg:calc(2.1rem*var(--fs)); --xl:calc(2.7rem*var(--fs)); --2xl:calc(3.4rem*var(--fs));
  --btn-h:72px; --btn-hsm:54px; --rad:18px; --radlg:26px;
  --accentColor:#1E88E5;
}
[data-theme="dark"]{
  --bg:#0F0F1A; --surface:#1A1A2E; --sur2:#16213E;
  --text:#F5F5F5; --muted:#9E9E9E; --border:#33335A; --shadow:rgba(0,0,0,0.5);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}

/* NAVBAR */
.navbar{display:flex;align-items:center;gap:8px;padding:10px 16px;background:var(--surface);box-shadow:0 2px 10px var(--shadow);position:sticky;top:0;z-index:100;flex-shrink:0;}
.nav-btn{height:var(--btn-hsm);min-width:var(--btn-hsm);border:none;border-radius:var(--rad);font-size:var(--sm);font-weight:800;cursor:pointer;background:var(--sur2);color:var(--text);transition:transform .12s;-webkit-tap-highlight-color:transparent;display:flex;align-items:center;justify-content:center;text-decoration:none;}
.nav-btn:active{transform:scale(0.91);}
.btn-home{background:var(--c-blue);color:white;font-size:1.5rem;}
.nav-title{font-size:var(--lg);font-weight:900;flex:1;padding-left:10px;}

/* MAIN CONTENT */
.main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 16px 36px;}

/* CARD SCENE */
.card-scene{width:100%;max-width:480px;height:320px;margin:0 auto;perspective:1000px;}
.card-3d{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .5s;cursor:pointer;border-radius:28px;}
.card-3d.flipped{transform:rotateY(180deg);}
.card-face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:28px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:28px;}
.card-front{/* bg set via JS */}
.card-back{transform:rotateY(180deg);background:var(--surface);border:5px solid var(--border);}

.card-emoji{font-size:8rem;line-height:1;user-select:none;}
.card-word{font-size:3rem;font-weight:900;text-align:center;line-height:1.1;}
.card-word-sm{font-size:var(--lg);font-weight:800;color:var(--muted);text-align:center;}
.card-check{font-size:3rem;line-height:1;}
.card-tap-hint{font-size:var(--sm);font-weight:700;opacity:0.7;margin-top:4px;}

/* NAV BUTTONS */
.card-nav{display:flex;gap:16px;justify-content:center;align-items:center;margin-top:24px;width:100%;max-width:480px;}
.btn-nav{height:80px;min-width:80px;border:none;border-radius:20px;font-size:2rem;cursor:pointer;font-weight:900;transition:transform .12s;-webkit-tap-highlight-color:transparent;flex:1;}
.btn-nav:active{transform:scale(0.91);}
.btn-prev{background:var(--sur2);color:var(--text);border:3px solid var(--border);}
.btn-next{background:var(--accentColor);color:white;}

/* PROGRESS */
.progress{font-size:var(--md);font-weight:800;color:var(--muted);margin-top:16px;text-align:center;}
.progress-bar-wrap{width:100%;max-width:480px;height:10px;background:var(--border);border-radius:100px;margin-top:10px;overflow:hidden;}
.progress-bar{height:100%;background:var(--accentColor);border-radius:100px;transition:width .3s ease;}

/* CELEBRATION SCREEN */
.celebrate{display:none;flex-direction:column;align-items:center;justify-content:center;gap:24px;text-align:center;padding:24px;}
.celebrate.show{display:flex;}
.celebrate-emoji{font-size:7rem;animation:bounce 0.6s infinite alternate;}
@keyframes bounce{from{transform:scale(1);}to{transform:scale(1.12);}}
.celebrate h2{font-size:var(--xl);font-weight:900;}
.celebrate p{font-size:var(--md);color:var(--muted);font-weight:700;}
.stars{font-size:2.5rem;letter-spacing:6px;animation:twinkle 1s infinite alternate;}
@keyframes twinkle{from{opacity:1;}to{opacity:0.5;}}
.btn-restart{height:var(--btn-h);padding:0 40px;border:none;border-radius:var(--radlg);font-size:var(--lg);font-weight:900;cursor:pointer;background:var(--accentColor);color:white;-webkit-tap-highlight-color:transparent;transition:transform .12s;font-family:'Nunito',sans-serif;}
.btn-restart:active{transform:scale(0.93);}

/* BACK LINK */
.back-link{display:inline-flex;align-items:center;gap:8px;font-size:var(--sm);font-weight:800;color:var(--muted);text-decoration:none;margin-bottom:20px;padding:8px 16px;border-radius:var(--rad);background:var(--sur2);-webkit-tap-highlight-color:transparent;}
.back-link:hover{color:var(--text);}
</style>
</head>
<body>

<nav class="navbar">
  <a href="../index.html" class="nav-btn btn-home" title="Início">🏠</a>
  <span class="nav-title" id="navTitle">📋 Exemplo</span>
  <button class="nav-btn btn-font" onclick="MF.adjustFont(-1)">A−</button>
  <button class="nav-btn btn-font" onclick="MF.adjustFont(1)">A+</button>
  <button class="nav-btn btn-theme" id="btnTheme" onclick="MF.toggleTheme()">🌙</button>
  <button class="nav-btn btn-lang" id="btnLang" onclick="MF.toggleLang()">🇧🇷</button>
</nav>

<div class="main" id="gameArea">
  <!-- Back link rendered by JS -->
  <div id="backLinkWrap"></div>

  <!-- Card -->
  <div class="card-scene">
    <div class="card-3d" id="card3d" onclick="Game.flip()">
      <div class="card-face card-front" id="cardFront">
        <span class="card-emoji" id="frontEmoji">📋</span>
        <span class="card-word" id="frontWord">Palavra</span>
        <span class="card-tap-hint" data-pt="Toque para ver!" data-en="Tap to see!">Toque para ver!</span>
      </div>
      <div class="card-face card-back" id="cardBack">
        <span class="card-check">✅</span>
        <span class="card-emoji" id="backEmoji" style="font-size:4rem;">📋</span>
        <span class="card-word" id="backWordPt" style="font-size:var(--lg);">PT</span>
        <span class="card-word-sm" id="backWordEn">EN</span>
      </div>
    </div>
  </div>

  <!-- Navigation -->
  <div class="card-nav">
    <button class="btn-nav btn-prev" id="btnPrev" onclick="Game.prev()">◀</button>
    <button class="btn-nav btn-next" id="btnNext" onclick="Game.next()">▶</button>
  </div>

  <!-- Progress -->
  <div class="progress" id="progressText">1 / 6</div>
  <div class="progress-bar-wrap">
    <div class="progress-bar" id="progressBar" style="width:16.6%"></div>
  </div>
</div>

<!-- Celebration Screen -->
<div class="celebrate" id="celebrateScreen">
  <div class="stars">⭐⭐⭐⭐⭐</div>
  <div class="celebrate-emoji">🎉</div>
  <h2 data-pt="Muito bem!" data-en="Well done!">Muito bem!</h2>
  <p data-pt="Você completou todos os cards!" data-en="You completed all the cards!">Você completou todos os cards!</p>
  <button class="btn-restart" onclick="Game.restart()" data-pt="Recomeçar 🔄" data-en="Restart 🔄">Recomeçar 🔄</button>
</div>

<script>
// DATA: substitua conforme o tópico
const TOPIC = {
  pt: 'Exemplo',
  en: 'Example',
  icon: '📋',
  accentColor: '#1E88E5',
  backLink: null,    // e.g. { href:'../cores.html', pt:'← Cores', en:'← Colors' }
};
const CARDS = [
  { icon: '🔴', pt: 'Vermelho',  en: 'Red',    bg: '#E53935', text: '#fff' },
  { icon: '🔵', pt: 'Azul',     en: 'Blue',   bg: '#1E88E5', text: '#fff' },
  { icon: '🟡', pt: 'Amarelo',  en: 'Yellow', bg: '#F9A825', text: '#333' },
  { icon: '🟢', pt: 'Verde',    en: 'Green',  bg: '#43A047', text: '#fff' },
  { icon: '🟠', pt: 'Laranja',  en: 'Orange', bg: '#FB8C00', text: '#fff' },
  { icon: '🟣', pt: 'Roxo',     en: 'Purple', bg: '#8E24AA', text: '#fff' },
];

// GAME ENGINE
const Game = {
  index: 0,
  isFlipped: false,

  init() {
    // Apply accent color
    document.documentElement.style.setProperty('--accentColor', TOPIC.accentColor);

    // Set navbar title
    const lang = localStorage.getItem('mf-lang') || 'pt';
    document.getElementById('navTitle').textContent =
      TOPIC.icon + ' ' + (lang === 'en' ? TOPIC.en : TOPIC.pt);

    // Back link
    if (TOPIC.backLink) {
      const wrap = document.getElementById('backLinkWrap');
      const a = document.createElement('a');
      a.className = 'back-link';
      a.href = TOPIC.backLink.href;
      a.dataset.pt = TOPIC.backLink.pt;
      a.dataset.en = TOPIC.backLink.en;
      a.textContent = lang === 'en' ? TOPIC.backLink.en : TOPIC.backLink.pt;
      wrap.appendChild(a);
    }

    this.render();
  },

  render() {
    const card = CARDS[this.index];
    const lang = localStorage.getItem('mf-lang') || 'pt';
    const isFlipped = this.isFlipped;

    // Un-flip visually first
    const card3d = document.getElementById('card3d');
    if (isFlipped) {
      card3d.classList.add('flipped');
    } else {
      card3d.classList.remove('flipped');
    }

    // Front face
    const front = document.getElementById('cardFront');
    front.style.background = card.bg || '#1E88E5';
    front.style.color = card.text || '#fff';

    document.getElementById('frontEmoji').textContent = card.icon;
    document.getElementById('frontWord').textContent = lang === 'en' ? card.en : card.pt;
    document.getElementById('frontWord').style.color = card.text || '#fff';

    // Back face
    document.getElementById('backEmoji').textContent = card.icon;
    document.getElementById('backWordPt').textContent = card.pt;
    document.getElementById('backWordPt').style.color = 'var(--text)';
    document.getElementById('backWordEn').textContent = card.en;

    // Card border (for white cards)
    if (card.border) {
      document.getElementById('cardFront').style.border = card.border;
    } else {
      document.getElementById('cardFront').style.border = 'none';
    }

    // Progress
    const total = CARDS.length;
    const current = this.index + 1;
    document.getElementById('progressText').textContent = current + ' / ' + total;
    document.getElementById('progressBar').style.width = ((current / total) * 100) + '%';

    // Prev button
    document.getElementById('btnPrev').style.opacity = this.index === 0 ? '0.4' : '1';
    document.getElementById('btnPrev').disabled = this.index === 0;
  },

  flip() {
    this.isFlipped = !this.isFlipped;
    const card3d = document.getElementById('card3d');
    if (this.isFlipped) {
      card3d.classList.add('flipped');
    } else {
      card3d.classList.remove('flipped');
    }
  },

  next() {
    if (this.index >= CARDS.length - 1) {
      this.showCelebration();
      return;
    }
    this.index++;
    this.isFlipped = false;
    this.render();
  },

  prev() {
    if (this.index <= 0) return;
    this.index--;
    this.isFlipped = false;
    this.render();
  },

  showCelebration() {
    document.getElementById('gameArea').style.display = 'none';
    const cel = document.getElementById('celebrateScreen');
    cel.classList.add('show');
    // Re-apply lang on celebration screen
    const lang = localStorage.getItem('mf-lang') || 'pt';
    cel.querySelectorAll('[data-pt]').forEach(el => {
      el.textContent = lang === 'en' ? (el.dataset.en || el.dataset.pt) : el.dataset.pt;
    });
  },

  restart() {
    this.index = 0;
    this.isFlipped = false;
    document.getElementById('celebrateScreen').classList.remove('show');
    document.getElementById('gameArea').style.display = 'flex';
    this.render();
  },

  // Called by MF lang system after lang changes
  onLangChange(lang) {
    // Update navbar
    document.getElementById('navTitle').textContent =
      TOPIC.icon + ' ' + (lang === 'en' ? TOPIC.en : TOPIC.pt);
    // Update back link if exists
    const wrap = document.getElementById('backLinkWrap');
    const a = wrap.querySelector('a');
    if (a) a.textContent = lang === 'en' ? (a.dataset.en || a.dataset.pt) : a.dataset.pt;
    // Re-render card
    this.render();
  }
};

// MF SYSTEM
const MF = {
  init() {
    this.applyTheme(localStorage.getItem('mf-theme') || 'light');
    this.applyFont(parseFloat(localStorage.getItem('mf-font') || '1'));
    this.applyLang(localStorage.getItem('mf-lang') || 'pt');
    // Init game after MF ready
    Game.init();
  },
  applyTheme(t) {
    document.documentElement.dataset.theme = t;
    const b = document.getElementById('btnTheme');
    if (b) b.textContent = t === 'dark' ? '☀️' : '🌙';
    localStorage.setItem('mf-theme', t);
  },
  toggleTheme() {
    this.applyTheme(document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark');
  },
  applyFont(s) {
    document.documentElement.style.setProperty('--fs', s);
    localStorage.setItem('mf-font', s);
  },
  adjustFont(d) {
    const s = parseFloat(localStorage.getItem('mf-font') || '1');
    this.applyFont(Math.max(0.7, Math.min(1.5, +(s + d * 0.1).toFixed(2))));
  },
  applyLang(lang) {
    document.documentElement.dataset.lang = lang;
    const b = document.getElementById('btnLang');
    if (b) b.textContent = lang === 'en' ? '🇨🇦' : '🇧🇷';
    document.querySelectorAll('[data-pt]').forEach(el => {
      el.textContent = lang === 'en' ? (el.dataset.en || el.dataset.pt) : el.dataset.pt;
    });
    localStorage.setItem('mf-lang', lang);
    if (typeof Game !== 'undefined' && Game.index !== undefined) {
      Game.onLangChange(lang);
    }
  },
  toggleLang() {
    this.applyLang(document.documentElement.dataset.lang === 'en' ? 'pt' : 'en');
  }
};
MF.init();
</script>
</body>
</html>
