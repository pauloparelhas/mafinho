<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Números – Mafinho</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet"/>
<style>
:root {
  --c-red:#E53935; --c-blue:#1E88E5; --c-yellow:#F9A825;
  --c-green:#43A047; --c-orange:#FB8C00; --c-purple:#8E24AA;
  --c-pink:#E91E63; --c-teal:#00897B;
  --bg:#F8F9FA; --surface:#FFFFFF; --sur2:#F1F3F5;
  --text:#212121; --muted:#757575; --border:#DEE2E6; --shadow:rgba(0,0,0,0.12);
  --fs:1; --sm:calc(1.2rem*var(--fs)); --md:calc(1.55rem*var(--fs));
  --lg:calc(2.1rem*var(--fs)); --xl:calc(2.7rem*var(--fs)); --2xl:calc(3.4rem*var(--fs));
  --btn-h:72px; --btn-hsm:54px; --rad:18px; --radlg:26px;
}
[data-theme="dark"]{
  --bg:#0F0F1A; --surface:#1A1A2E; --sur2:#16213E;
  --text:#F5F5F5; --muted:#9E9E9E; --border:#33335A; --shadow:rgba(0,0,0,0.5);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

.navbar{display:flex;align-items:center;gap:8px;padding:10px 16px;background:var(--surface);box-shadow:0 2px 10px var(--shadow);position:sticky;top:0;z-index:100;}
.nav-btn{height:var(--btn-hsm);min-width:var(--btn-hsm);border:none;border-radius:var(--rad);font-size:var(--sm);font-weight:800;cursor:pointer;background:var(--sur2);color:var(--text);transition:transform .12s;-webkit-tap-highlight-color:transparent;display:flex;align-items:center;justify-content:center;text-decoration:none;}
.nav-btn:active{transform:scale(0.91);}
.btn-home{background:var(--c-blue);color:white;font-size:1.5rem;}
.nav-title{font-size:var(--lg);font-weight:900;flex:1;padding-left:10px;}

.hero{text-align:center;padding:36px 20px 24px;border-bottom:6px solid var(--c-blue);}
.hero-icon{font-size:5rem;line-height:1;margin-bottom:12px;}
.hero h1{font-size:var(--2xl);font-weight:900;margin-bottom:8px;}
.hero p{font-size:var(--md);color:var(--muted);font-weight:700;}

.container{max-width:900px;margin:0 auto;padding:24px 16px 48px;}
.grid-games{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:20px;margin-top:28px;}
.game-card{background:var(--surface);border-radius:var(--radlg);box-shadow:0 5px 20px var(--shadow);padding:28px 16px;text-align:center;text-decoration:none;color:var(--text);display:flex;flex-direction:column;align-items:center;gap:12px;border:4px solid var(--border);transition:transform .15s;-webkit-tap-highlight-color:transparent;cursor:pointer;}
.game-card:hover{transform:translateY(-5px);}
.game-card:active{transform:scale(0.94);}
.game-card.coming{opacity:0.55;cursor:default;pointer-events:none;}
.game-card.ready{border-color:var(--c-blue);}
.g-icon{font-size:3.5rem;line-height:1;}
.g-title{font-size:var(--lg);font-weight:900;}
.g-badge{font-size:var(--sm);font-weight:800;padding:5px 16px;border-radius:100px;}
.badge-ready{background:var(--c-green);color:white;}
.badge-soon{background:var(--border);color:var(--muted);}
</style>
</head>
<body>
<nav class="navbar">
  <a href="index.html" class="nav-btn btn-home" title="Início">🏠</a>
  <span class="nav-title">🔢 <span data-pt="Números" data-en="Numbers">Números</span></span>
  <button class="nav-btn btn-font" onclick="MF.adjustFont(-1)">A−</button>
  <button class="nav-btn btn-font" onclick="MF.adjustFont(1)">A+</button>
  <button class="nav-btn btn-theme" id="btnTheme" onclick="MF.toggleTheme()">🌙</button>
  <button class="nav-btn btn-lang" id="btnLang" onclick="MF.toggleLang()">🇧🇷</button>
</nav>

<div class="hero">
  <div class="hero-icon">🔢</div>
  <h1 data-pt="Números" data-en="Numbers">Números</h1>
  <p data-pt="Conte e aprenda!" data-en="Count and learn!">Conte e aprenda!</p>
</div>

<div class="container">
  <div class="grid-games">
    <a href="numeros_flashcard.html" class="game-card ready">
      <span class="g-icon">💡</span>
      <span class="g-title" data-pt="Flashcards" data-en="Flashcards">Flashcards</span>
      <span class="g-badge badge-ready" data-pt="Disponível" data-en="Available">Disponível</span>
    </a>
    <a href="" class="game-card coming">
      <span class="g-icon">🔢</span>
      <span class="g-title" data-pt="Contar" data-en="Count">Contar</span>
      <span class="g-badge badge-soon" data-pt="Em breve" data-en="Coming soon">Em breve</span>
    </a>
    <a href="" class="game-card coming">
      <span class="g-icon">🏋</span>
      <span class="g-title" data-pt="Arrastar" data-en="Drag">Arrastar</span>
      <span class="g-badge badge-soon" data-pt="Em breve" data-en="Coming soon">Em breve</span>
    </a>
    <a href="" class="game-card coming">
      <span class="g-icon">📦</span>
      <span class="g-title" data-pt="Ordenar" data-en="Order">Ordenar</span>
      <span class="g-badge badge-soon" data-pt="Em breve" data-en="Coming soon">Em breve</span>
    </a>
  </div>
</div>

<script>
const MF={
  init(){this.applyTheme(localStorage.getItem('mf-theme')||'light');this.applyFont(parseFloat(localStorage.getItem('mf-font')||'1'));this.applyLang(localStorage.getItem('mf-lang')||'pt');},
  applyTheme(t){document.documentElement.dataset.theme=t;const b=document.getElementById('btnTheme');if(b)b.textContent=t==='dark'?'☀️':'🌙';localStorage.setItem('mf-theme',t);},
  toggleTheme(){this.applyTheme(document.documentElement.dataset.theme==='dark'?'light':'dark');},
  applyFont(s){document.documentElement.style.setProperty('--fs',s);localStorage.setItem('mf-font',s);},
  adjustFont(d){const s=parseFloat(localStorage.getItem('mf-font')||'1');this.applyFont(Math.max(0.7,Math.min(1.5,+(s+d*0.1).toFixed(2))));},
  applyLang(lang){document.documentElement.dataset.lang=lang;const b=document.getElementById('btnLang');if(b)b.textContent=lang==='en'?'🇨🇦':'🇧🇷';document.querySelectorAll('[data-pt]').forEach(el=>{el.textContent=lang==='en'?(el.dataset.en||el.dataset.pt):el.dataset.pt;});localStorage.setItem('mf-lang',lang);},
  toggleLang(){this.applyLang(document.documentElement.dataset.lang==='en'?'pt':'en');}
};
MF.init();
</script>
</body>
</html>
