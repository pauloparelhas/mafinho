<!DOCTYPE html>
<html lang="pt-BR" data-theme="light" data-lang="pt" data-country="br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mafinho — Frutas</title>
  <link rel="stylesheet" href="base.css">
</head>
<body>

<nav class="navbar" id="navbar">
  <button id="navLogo"  onclick="goToIndex()" title="Início">🏠</button>
  <button id="btnHome"  onclick="confirmHome()">↩</button>
  <button id="btnPrev"  onclick="prevPhase()">◀</button>
  <button id="btnNext"  onclick="nextPhase()">▶</button>
  <span id="navTitle" style="flex:1;text-align:center;font-weight:900;font-size:var(--lg)">Frutas</span>
  <span id="navLangBadge" class="nav-lang-badge" style="display:none">🇧🇷 PT</span>
  <button id="themeBtn" onclick="MF.toggleTheme()">🌙</button>
  <button id="soundBtn" onclick="MF.toggleSound()">🔊</button>
  <button id="lockBtn"  onclick="MF.handleLock()">🔒</button>
</nav>

<!-- ═══ HUB ═══ -->
<div id="sHub">
  <div class="hub-header">
    <span class="hub-icon">🍎</span>
    <h1 id="hubTitle">Frutas</h1>
    <p id="hubSub">Conheça as frutas!</p>
  </div>
  <div class="game-grid">
    <div class="game-card ready" onclick="Nav.goLang('flash')">
      <span class="g-icon">💡</span>
      <span class="g-title" id="hubFlash">Flashcards</span>
      <span class="g-badge badge-ready" id="badgeFlash">Disponível</span>
    </div>
    <div class="game-card ready" onclick="Nav.goLang('click')">
      <span class="g-icon">🎯</span>
      <span class="g-title" id="hubClicar">Clicar</span>
      <span class="g-badge badge-ready" id="badgeClicar">Disponível</span>
    </div>
    <div class="game-card ready" onclick="Nav.goLang('paint')">
      <span class="g-icon">🎨</span>
      <span class="g-title" id="hubPaint">Pintar</span>
      <span class="g-badge badge-ready" id="badgePaint">Disponível</span>
    </div>
  </div>
</div>

<!-- ═══ IDIOMA ═══ -->
<div id="sLang">
  <div class="lang-intro">
    <h1>🍎 Mafinho Explora!</h1>
    <p>Escolha o idioma · Choose the language</p>
  </div>
  <div class="lang-cards">
    <button class="lang-card lang-card-br" onclick="Nav.startGame('pt')">
      🇧🇷<span>Português</span>
    </button>
    <button class="lang-card lang-card-ca" onclick="Nav.startGame('en')">
      🇨🇦<span>English</span>
    </button>
  </div>
</div>

<!-- ═══ FLASHCARD ═══ -->
<div id="sFlash">
  <button class="back-link" onclick="Nav.backToHub()">← <span id="flashBackLabel">Frutas</span></button>
  <div class="card-scene" onclick="FlashGame.flip()">
    <div class="card-3d" id="flashCard3d">
      <div class="card-face" id="flashFront">
        <div class="card-emoji"><img id="flashEmoji" src="" alt="fruta"></div>
        <span class="card-tap-hint" id="flashTapHint">Toque para ver!</span>
      </div>
      <div class="card-face card-back">
        <div class="card-emoji"><img id="flashBackEmoji" src="" alt="fruta"></div>
        <span class="card-back-name" id="flashName"></span>
      </div>
    </div>
  </div>
  <div class="card-nav">
    <button class="nav-arrow" id="flashPrev" onclick="FlashGame.prev();event.stopPropagation()">◀</button>
    <span class="progress-text" id="flashProgress">1 / 12</span>
    <button class="nav-arrow" id="flashNext" onclick="FlashGame.next();event.stopPropagation()">▶</button>
  </div>
  <div class="progress-bar-wrap"><div class="progress-bar" id="flashBar"></div></div>
</div>

<!-- ═══ CLICAR ═══ -->
<div id="sClick">
  <button class="back-link" onclick="Nav.backToHub()">← <span id="clickBackLabel">Frutas</span></button>
  <p class="click-instruction" id="clickInstruction"></p>
  <div class="click-options" id="clickOptions"></div>
  <p class="click-round" id="clickRoundBadge"></p>
</div>

<!-- ═══ PINTAR ═══ -->
<div id="sPaint">
  <button class="back-link" onclick="Nav.backToHub()">← <span id="paintBackLabel">Frutas</span></button>
  <p class="paint-instruction" id="paintInstruction">Passe o dedo!</p>
  <div class="paint-wrap">
    <img id="paintImg" src="" alt="" class="paint-reveal-img">
    <div class="paint-grid" id="paintGrid"></div>
  </div>
  <p class="paint-round" id="paintRoundBadge"></p>
</div>

<!-- ═══ CELEBRAÇÃO ═══ -->
<div id="sCelebrate">
  <div class="stars">⭐⭐⭐⭐⭐</div>
  <div class="cel-emoji">🎉</div>
  <div class="cel-title" id="celTitle">Muito bem!</div>
  <div class="cel-sub" id="celSub">Você conhece todas as frutas!</div>
  <button class="btn-big" onclick="Nav.restartGame()" id="btnRestart">Recomeçar 🔄</button>
  <button class="btn-mid" onclick="Nav.backToHub()" id="btnBackHub">← Frutas</button>
</div>

<div class="enc-toast" id="encToast">⭐ Muito bem!</div>

<script src="base.js"></script>
<style>
.game-card.ready { border-color:var(--c-green); }

/* ── CLICK ── */
#sClick { flex:1; display:none; flex-direction:column; align-items:center; padding:16px 12px 8px; gap:12px; }
#sClick .back-link { margin-bottom:0; }
.click-instruction { font-size:var(--xl); font-weight:900; text-align:center; color:var(--text); line-height:1.3; }
.click-options { display:flex; flex-wrap:wrap; justify-content:center; gap:16px; max-width:340px; }
.click-opt {
  width:120px; height:120px; border-radius:var(--radlg);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; background:var(--surface); border:4px solid var(--border);
  box-shadow:0 4px 16px var(--shadow); flex-direction:column; gap:6px;
  transition:transform .12s; -webkit-tap-highlight-color:transparent; position:relative; overflow:hidden;
}
.click-opt img { width:80px; height:80px; object-fit:contain; pointer-events:none; }
.click-opt:active { transform:scale(0.92); }
@keyframes clickShake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-7px)} 60%{transform:translateX(7px)} }
.click-opt.wrong { animation:clickShake .4s ease; }
.x-overlay { position:absolute; top:0; left:0; width:100%; height:100%; display:flex; align-items:center; justify-content:center; font-size:2.4rem; color:#E53935; background:rgba(229,57,53,.18); opacity:0; pointer-events:none; transition:opacity .2s; }
.click-opt.wrong .x-overlay { opacity:1; }
.click-round { font-size:var(--sm); font-weight:800; color:var(--muted); }

/* ── PAINT GAME ── */
#sPaint { flex:1; display:none; flex-direction:column; align-items:center; padding:16px 12px 8px; gap:14px; }
.paint-instruction { font-size:var(--lg); font-weight:900; text-align:center; }
.paint-wrap { position:relative; width:240px; height:240px; border-radius:var(--radlg); overflow:hidden; box-shadow:0 6px 24px var(--shadow); background:var(--sur2); }
.paint-reveal-img { width:100%; height:100%; object-fit:contain; display:block; }
.paint-grid { position:absolute; top:0; left:0; width:100%; height:100%; display:grid; grid-template-columns:repeat(2,1fr); grid-template-rows:repeat(2,1fr); gap:3px; touch-action:none; }
.paint-tile { border-radius:8px; cursor:pointer; transition:opacity .4s ease; -webkit-tap-highlight-color:transparent; }
.paint-tile:active { opacity:0.7; }
.paint-tile.removed { opacity:0 !important; pointer-events:none; }
.paint-round { font-size:var(--sm); font-weight:800; color:var(--muted); }
</style>
<script>
/* ═══════════════════════════════════════════════
   DADOS — Frutas
═══════════════════════════════════════════════ */
const FRUITS = [
  { id:'banana',      pt:'Banana',    en:'Banana',     art:'a' },
  { id:'apple',       pt:'Maçã',      en:'Apple',      art:'a' },
  { id:'pineapple',   pt:'Abacaxi',   en:'Pineapple',  art:'o' },
  { id:'strawberry',  pt:'Morango',   en:'Strawberry', art:'o' },
  { id:'grape',       pt:'Uva',       en:'Grape',      art:'a' },
  { id:'pear',        pt:'Pera',      en:'Pear',       art:'a' },
  { id:'watermelon',  pt:'Melancia',  en:'Watermelon', art:'a' },
  { id:'melon',       pt:'Melão',     en:'Melon',      art:'o' },
  { id:'avocado',     pt:'Abacate',   en:'Avocado',    art:'o' },
  { id:'guava',       pt:'Goiaba',    en:'Guava',      art:'a' },
  { id:'mango',       pt:'Manga',     en:'Mango',      art:'a' },
  { id:'cherry',      pt:'Cereja',    en:'Cherry',     art:'a' },
];

function fruitSrc(id) { return 'img/fruits/' + id + '.png'; }

function fruitPhrase(f, lang) {
  if (lang === 'pt') return 'Esta é um' + (f.art === 'a' ? 'a ' : ' ') + f.pt + '!';
  return 'This is a' + (/^[aeiou]/i.test(f.en) ? 'n ' : ' ') + f.en + '!';
}

function fruitQuestion(f, lang) {
  if (lang === 'pt') return 'Qual é ' + (f.art === 'a' ? 'a ' : 'o ') + f.pt + '?';
  return 'Which one is the ' + f.en + '?';
}

/* ── LANG ── */
const LANG = {
  pt: {
    country:'br', tts:'pt-BR',
    navTitle:'Frutas', navBadge:'🇧🇷 PT', corners:'⭐',
    hubSub:'Conheça as frutas!',
    hubFlash:'Flashcards', badgeFlash:'Disponível',
    hubClicar:'Clicar', badgeClicar:'Disponível',
    hubPaint:'Pintar', badgePaint:'Disponível',
    flashBackLabel:'Frutas', flashTapHint:'Toque para ver!',
    flashCelSub:'Você conhece todas as frutas!',
    flashCelSpoken:'Parabéns! Você conhece todas as frutas! Que esperto!',
    clickBackLabel:'Frutas',
    clickCelSub:'Você acertou todas as frutas!',
    clickCelSpoken:'Parabéns! Você acertou todas as frutas! Muito bem!',
    paintBackLabel:'Frutas',
    paintInstruction:'Passe o dedo e descubra a fruta!',
    paintCelSub:'Você descobriu todas as frutas!',
    paintCelSpoken:'Incrível! Você descobriu todas as frutas! Parabéns!',
    celTitle:'Muito bem!',
    restart:'Recomeçar 🔄', backHub:'← Frutas',
    encourage:[
      {text:'Isso! Muito bem! ⭐',   spoken:'Isso! Muito bem!'},
      {text:'Parabéns! 🌟',          spoken:'Parabéns!'},
      {text:'Uau! Que esperto! 🎉',  spoken:'Uau! Que esperto!'},
      {text:'Eba! Acertou! ⭐',      spoken:'Eba! Acertou!'},
      {text:'Que inteligente! 🌟',   spoken:'Que inteligente!'},
      {text:'Boa! Boa! Boa! ⭐',     spoken:'Boa! Boa! Boa!'},
      {text:'Que criança boa! 🌟',   spoken:'Que criança boa!'},
    ],
  },
  en: {
    country:'ca', tts:'en-US',
    navTitle:'Fruits', navBadge:'🇨🇦 EN', corners:'🍁',
    hubSub:'Meet the fruits!',
    hubFlash:'Flashcards', badgeFlash:'Available',
    hubClicar:'Click', badgeClicar:'Available',
    hubPaint:'Paint', badgePaint:'Available',
    flashBackLabel:'Fruits', flashTapHint:'Tap to see!',
    flashCelSub:'You know all the fruits!',
    flashCelSpoken:'Hooray! You know all the fruits! So smart!',
    clickBackLabel:'Fruits',
    clickCelSub:'You got all the fruits right!',
    clickCelSpoken:'Hooray! You got all the fruits right! Amazing!',
    paintBackLabel:'Fruits',
    paintInstruction:'Swipe and discover the fruit!',
    paintCelSub:'You discovered all the fruits!',
    paintCelSpoken:'Amazing! You discovered all the fruits! Great job!',
    celTitle:'Well done!',
    restart:'Restart 🔄', backHub:'← Fruits',
    encourage:[
      {text:'Yes! Great! ⭐',          spoken:'Yes! Great job!'},
      {text:'Amazing! 🌟',             spoken:'Amazing!'},
      {text:'Wow! So smart! 🎉',       spoken:'Wow! So smart!'},
      {text:'You got it! ⭐',          spoken:'You got it!'},
      {text:'So clever! 🌟',           spoken:'So clever!'},
      {text:'Yay! Yay! Yay! ⭐',       spoken:'Yay! Yay! Yay!'},
      {text:'Such a good kid! 🌟',     spoken:'Such a good kid!'},
    ],
  },
};

function shuffle(a) {
  const b = [...a];
  for (let i = b.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [b[i], b[j]] = [b[j], b[i]];
  }
  return b;
}

/* ── Nav overrides ── */
Nav.startGame = function(lang) {
  this._applyLang(lang);
  document.getElementById('navLangBadge').style.display = '';
  if (this.currentGame === 'flash') {
    this._show('sFlash'); FlashGame.start(lang);
  } else if (this.currentGame === 'click') {
    this._show('sClick'); ClickGame.start(lang);
  } else if (this.currentGame === 'paint') {
    this._show('sPaint'); PaintGame.start(lang);
  }
};

Nav.restartGame = function() {
  document.getElementById('sCelebrate').classList.remove('show');
  if (this.currentGame === 'flash') {
    this._show('sFlash'); FlashGame.start(FlashGame.lang);
  } else if (this.currentGame === 'click') {
    this._show('sClick'); ClickGame.start(ClickGame.lang);
  } else if (this.currentGame === 'paint') {
    this._show('sPaint'); PaintGame.start(PaintGame.lang);
  }
};

Nav._applyLang = function(lang) {
  const L = LANG[lang];
  const set = (id, txt) => { const el = document.getElementById(id); if (el) el.textContent = txt; };
  document.documentElement.dataset.country = L.country;
  document.documentElement.lang = lang === 'pt' ? 'pt-BR' : 'en';
  set('navTitle',         L.navTitle);
  set('navLangBadge',     L.navBadge);
  set('hubSub',           L.hubSub);
  set('hubFlash',         L.hubFlash);
  set('badgeFlash',       L.badgeFlash);
  set('hubClicar',        L.hubClicar);
  set('badgeClicar',      L.badgeClicar);
  set('hubPaint',         L.hubPaint);
  set('badgePaint',       L.badgePaint);
  set('flashBackLabel',   L.flashBackLabel);
  set('flashTapHint',     L.flashTapHint);
  set('clickBackLabel',   L.clickBackLabel);
  set('paintBackLabel',   L.paintBackLabel);
  set('paintInstruction', L.paintInstruction);
  set('btnRestart',       L.restart);
  set('btnBackHub',       L.backHub);
  this._setCorners(L.corners);
  TTS.setLang(L.tts);
};

/* ═══════════════════════════════════════════════
   FLASH GAME
═══════════════════════════════════════════════ */
const FlashGame = {
  lang:'pt', step:0, flipped:false, encCount:0,
  sequence:[], _encTimer:null,

  start(lang) {
    this.lang = lang;
    this.step = 0;
    this.flipped = false;
    this.encCount = 0;
    this.sequence = shuffle([...FRUITS]);
    TTS.init();
    this._render();
  },

  _render() {
    const f = this.sequence[this.step];
    const name = this.lang === 'pt' ? f.pt : f.en;
    const src  = fruitSrc(f.id);

    document.getElementById('flashCard3d').classList.toggle('flipped', this.flipped);
    document.getElementById('flashFront').style.background = '';
    const fi = document.getElementById('flashEmoji'); fi.src = src; fi.alt = name;
    const bi = document.getElementById('flashBackEmoji'); bi.src = src; bi.alt = name;
    document.getElementById('flashName').textContent = name;

    const total = this.sequence.length;
    document.getElementById('flashProgress').textContent = (this.step + 1) + ' / ' + total;
    document.getElementById('flashBar').style.width = (((this.step + 1) / total) * 100) + '%';
    document.getElementById('flashPrev').disabled = this.step === 0;

    TTS.speak(name);
  },

  flip() {
    this.flipped = !this.flipped;
    document.getElementById('flashCard3d').classList.toggle('flipped', this.flipped);
    if (this.flipped) {
      const f = this.sequence[this.step];
      const name = this.lang === 'pt' ? f.pt : f.en;
      speechSynthesis && speechSynthesis.cancel();
      SFX.playCorrect();
      TTS.speakExcitedAndWait(name + '!');
      this.encCount++;
      if (this.encCount % 3 === 0) {
        const enc = LANG[this.lang].encourage[Math.floor(Math.random() * LANG[this.lang].encourage.length)];
        this._encourage(enc);
      }
    } else {
      const f = this.sequence[this.step];
      TTS.speak(this.lang === 'pt' ? f.pt : f.en);
    }
  },

  next() {
    speechSynthesis && speechSynthesis.cancel();
    clearTimeout(this._encTimer);
    if (this.step >= this.sequence.length - 1) { this._celebrate(); return; }
    this.step++; this.flipped = false; this._render();
  },

  prev() {
    if (this.step <= 0) return;
    speechSynthesis && speechSynthesis.cancel();
    clearTimeout(this._encTimer);
    this.step--; this.flipped = false; this._render();
  },

  _celebrate() {
    const L = LANG[this.lang];
    clearTimeout(this._encTimer);
    speechSynthesis && speechSynthesis.cancel();
    document.getElementById('celTitle').textContent   = L.celTitle;
    document.getElementById('celSub').textContent     = L.flashCelSub;
    document.getElementById('btnRestart').textContent = L.restart;
    document.getElementById('btnBackHub').textContent = L.backHub;
    localStorage.setItem('fruits_flash_progresso', JSON.stringify({completed:true, date:new Date().toISOString()}));
    Nav._show('sCelebrate');
    setTimeout(() => TTS.speak(L.flashCelSpoken), 600);
  },

  _encourage(enc) {
    const t = document.getElementById('encToast');
    t.textContent = enc.text;
    t.classList.add('show');
    this._encTimer = setTimeout(() => {
      speechSynthesis && speechSynthesis.cancel();
      TTS.speak(enc.spoken);
    }, 2200);
    setTimeout(() => t.classList.remove('show'), 3800);
  }
};

/* ═══════════════════════════════════════════════
   CLICK GAME
═══════════════════════════════════════════════ */
const ClickGame = {
  lang:'pt', step:0, totalSteps:6, _locked:false,
  _rounds:[], _encTimer:null,

  start(lang) {
    this.lang = lang;
    this.step = 0;
    this._locked = false;
    this._buildRounds();
    TTS.init();
    this._render();
  },

  _buildRounds() {
    this._rounds = [];
    const seq = shuffle([...FRUITS]).slice(0, this.totalSteps);
    seq.forEach(correct => {
      const others = shuffle(FRUITS.filter(f => f.id !== correct.id)).slice(0, 2);
      const opts   = shuffle([correct, ...others]);
      this._rounds.push({ correct, opts, correctIdx: opts.indexOf(correct) });
    });
  },

  _render() {
    const round = this._rounds[this.step];
    const L = LANG[this.lang];
    document.getElementById('clickRoundBadge').textContent = (this.step + 1) + ' / ' + this.totalSteps;
    document.getElementById('clickInstruction').textContent = fruitQuestion(round.correct, this.lang);

    const el = document.getElementById('clickOptions');
    el.innerHTML = '';
    round.opts.forEach((f, i) => {
      const btn = document.createElement('button');
      btn.className = 'click-opt';
      const img = document.createElement('img');
      img.src = fruitSrc(f.id);
      img.alt = this.lang === 'pt' ? f.pt : f.en;
      btn.appendChild(img);
      const xOv = document.createElement('span');
      xOv.className = 'x-overlay'; xOv.textContent = '✖';
      btn.appendChild(xOv);
      btn.addEventListener('click', () => {
        if (this._locked) return;
        if (i === round.correctIdx) this._onCorrect(round.correct);
        else                        this._onWrong(btn);
      });
      el.appendChild(btn);
    });

    speechSynthesis && speechSynthesis.cancel();
    setTimeout(() => TTS.speak(fruitQuestion(round.correct, this.lang)), 300);
  },

  _onCorrect(f) {
    this._locked = true;
    clearTimeout(this._encTimer);
    speechSynthesis && speechSynthesis.cancel();
    const L = LANG[this.lang];
    const enc = L.encourage[Math.floor(Math.random() * L.encourage.length)];
    SFX.playCorrect();
    const t = document.getElementById('encToast');
    t.textContent = enc.text; t.classList.add('show');
    TTS.speak(fruitPhrase(f, this.lang));
    this._encTimer = setTimeout(() => {
      speechSynthesis && speechSynthesis.cancel();
      TTS.speak(enc.spoken);
    }, 2000);
    setTimeout(() => t.classList.remove('show'), 3800);
    setTimeout(() => {
      this._locked = false;
      clearTimeout(this._encTimer);
      this.step++;
      if (this.step >= this.totalSteps) this._celebrate();
      else                              this._render();
    }, 3600);
  },

  _onWrong(btn) {
    SFX.playWrong(); btn.classList.add('wrong');
    setTimeout(() => btn.classList.remove('wrong'), 720);
  },

  _celebrate() {
    const L = LANG[this.lang];
    clearTimeout(this._encTimer);
    speechSynthesis && speechSynthesis.cancel();
    document.getElementById('celTitle').textContent   = L.celTitle;
    document.getElementById('celSub').textContent     = L.clickCelSub;
    document.getElementById('btnRestart').textContent = L.restart;
    document.getElementById('btnBackHub').textContent = L.backHub;
    localStorage.setItem('fruits_click_progresso', JSON.stringify({completed:true, date:new Date().toISOString()}));
    Nav._show('sCelebrate');
    setTimeout(() => TTS.speak(L.clickCelSpoken), 600);
  },
};

/* ═══════════════════════════════════════════════
   PAINT GAME
═══════════════════════════════════════════════ */
const PAINT_COLORS = ['#E53935','#1E88E5','#43A047','#F9A825'];

const PaintGame = {
  lang:'pt', step:0, sequence:[], _locked:false,

  start(lang) {
    this.lang = lang;
    this.step = 0;
    this._locked = false;
    this.sequence = shuffle([...FRUITS]).slice(0, 6);
    TTS.init();
    this._render();
  },

  _render() {
    const f = this.sequence[this.step];
    const img = document.getElementById('paintImg');
    img.src = fruitSrc(f.id);
    img.alt = this.lang === 'pt' ? f.pt : f.en;

    const total = this.sequence.length;
    document.getElementById('paintRoundBadge').textContent = (this.step + 1) + ' / ' + total;

    const grid = document.getElementById('paintGrid');
    grid.innerHTML = '';
    const colors = shuffle([...PAINT_COLORS]);
    let removed = 0;
    colors.forEach(color => {
      const tile = document.createElement('div');
      tile.className = 'paint-tile';
      tile.style.background = color;
      const onTap = () => {
        if (tile.classList.contains('removed') || this._locked) return;
        tile.classList.add('removed');
        removed++;
        if (removed >= 4) { this._locked = true; this._onReveal(f); }
      };
      tile.addEventListener('click', onTap);
      tile.addEventListener('touchstart', e => { e.preventDefault(); onTap(); }, {passive:false});
      grid.appendChild(tile);
    });

    speechSynthesis && speechSynthesis.cancel();
    setTimeout(() => TTS.speak(LANG[this.lang].paintInstruction), 300);
  },

  _onReveal(f) {
    SFX.playCorrect();
    speechSynthesis && speechSynthesis.cancel();
    setTimeout(() => TTS.speak(fruitPhrase(f, this.lang)), 400);
    setTimeout(() => {
      this.step++;
      if (this.step >= this.sequence.length) this._celebrate();
      else { this._locked = false; this._render(); }
    }, 2800);
  },

  _celebrate() {
    const L = LANG[this.lang];
    speechSynthesis && speechSynthesis.cancel();
    document.getElementById('celTitle').textContent   = L.celTitle;
    document.getElementById('celSub').textContent     = L.paintCelSub;
    document.getElementById('btnRestart').textContent = L.restart;
    document.getElementById('btnBackHub').textContent = L.backHub;
    localStorage.setItem('fruits_paint_progresso', JSON.stringify({completed:true, date:new Date().toISOString()}));
    Nav._show('sCelebrate');
    setTimeout(() => TTS.speak(L.paintCelSpoken), 600);
  },
};

/* ── BOOT ── */
MF.currentGameId = 'fruits';
Nav.boot(['sHub','sLang','sFlash','sClick','sPaint','sCelebrate']);
</script>
