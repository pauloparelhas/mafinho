<!DOCTYPE html>
<html lang="pt" data-theme="light" data-country="br">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"/>
<title>Emoções — Mafinho v2</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap"
      rel="stylesheet" media="print" onload="this.media='all'"/>
<link rel="stylesheet" href="base.css"/>
<style>
/* ═══════════════════════════════════════════
   CSS ESPECÍFICO — emotions.html
═══════════════════════════════════════════ */
.hub-hero { border-bottom-color:var(--c-pink); }
.game-card.ready { border-color:var(--c-pink); }

#sFlash {
  flex:1; display:none; flex-direction:column;
  align-items:center; padding:20px 16px 32px; gap:0;
}
.card-row   { display:flex; align-items:center; gap:14px; width:100%; max-width:520px; }
.card-scene { flex:1; height:320px; perspective:1000px; min-width:0; }
.card-3d {
  width:100%; height:100%; position:relative;
  transform-style:preserve-3d; transition:transform .5s;
  cursor:pointer; border-radius:28px;
}
.card-3d.flipped { transform:rotateY(180deg); }
.card-face {
  position:absolute; inset:0;
  backface-visibility:hidden; -webkit-backface-visibility:hidden;
  border-radius:28px; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:14px; padding:24px;
}
.card-back  { transform:rotateY(180deg); background:var(--surface); border:5px solid var(--border); }
.card-emoji      { font-size:7rem; line-height:1; user-select:none; }
.card-emoji svg  { width:140px; height:140px; }
.click-opt svg   { width:80px; height:80px; }

@media (min-width:600px) {
  .card-emoji svg  { width:200px; height:200px; }
  .click-opt       { width:140px; height:140px; }
  .click-opt svg   { width:100px; height:100px; }
}
@media (min-width:1024px) {
  .card-emoji svg  { width:240px; height:240px; }
  .card-scene      { height:400px; }
  .click-opt       { width:170px; height:170px; }
  .click-opt svg   { width:120px; height:120px; }
}
.card-tap-hint   { font-size:var(--sm); font-weight:700; opacity:0.75; text-align:center; color:inherit; }
.card-back-name  { font-size:2rem; font-weight:900; text-align:center; line-height:1.2; }
.flash-progress  { font-size:var(--sm); font-weight:800; color:var(--muted); text-align:center; margin-top:16px; }
#sFlash .card-nav { max-width:520px; }
#sFlash .progress-bar-wrap { max-width:520px; }

#sClick {
  flex:1; display:none; flex-direction:column;
  align-items:center; padding:12px 12px 8px; gap:10px;
}
#sClick .back-link { margin-bottom:0; }
.click-instruction {
  font-size:var(--xl); font-weight:900; text-align:center;
  color:var(--country-accent);
}
.click-options {
  display:flex; gap:14px; justify-content:center;
  width:100%; max-width:420px;
}
.click-opt {
  width:110px; height:110px; border:none; border-radius:var(--radlg);
  font-size:4.5rem; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  background:var(--surface); border:4px solid var(--border);
  box-shadow:0 4px 16px rgba(0,0,0,0.15);
  position:relative; overflow:hidden;
  -webkit-tap-highlight-color:transparent;
  transition:transform .12s;
}
.click-opt:active { transform:scale(0.94); }
.click-opt .x-overlay {
  position:absolute; inset:0; background:rgba(0,0,0,0.55);
  display:flex; align-items:center; justify-content:center;
  font-size:3rem; color:white; border-radius:inherit;
  opacity:0; pointer-events:none;
}
@keyframes xShake {
  0%  { transform:translate(0,0) rotate(0deg); opacity:1; }
  15% { transform:translate(-10px,0) rotate(-7deg); }
  30% { transform:translate(10px,0)  rotate(7deg); }
  45% { transform:translate(-8px,0)  rotate(-5deg); }
  60% { transform:translate(8px,0)   rotate(5deg); }
  75% { transform:translate(-4px,0)  rotate(-2deg); }
  88% { opacity:1; }
  100%{ transform:translate(0,0) rotate(0deg); opacity:0; }
}
.click-opt.wrong .x-overlay { opacity:1; animation:xShake .7s ease; }
.click-round { font-size:var(--sm); font-weight:800; color:var(--muted); }

#sFind {
  flex:1; display:none; flex-direction:column;
  align-items:center; padding:12px 12px 8px; gap:10px;
}
#sFind .back-link { margin-bottom:0; }
.find-instruction { font-size:var(--lg); font-weight:900; text-align:center; color:var(--text); line-height:1.4; }
.find-target-word { display:inline-block; padding:2px 14px; border-radius:12px; background:var(--c-pink); color:white; font-weight:900; }
.find-target-word svg { width:26px; height:26px; vertical-align:middle; display:inline-block; }
.find-grid {
  display:flex; flex-wrap:wrap; justify-content:center; align-items:center;
  gap:12px; max-width:360px; padding:8px; flex:1; align-content:center;
}
.find-item {
  width:80px; height:80px; border-radius:var(--radlg);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; background:var(--surface); border:3px solid var(--border);
  box-shadow:0 3px 12px var(--shadow);
  transition:transform .15s, opacity .25s;
  -webkit-tap-highlight-color:transparent;
}
.find-item svg { width:60px; height:60px; }
.find-item:active { transform:scale(0.92); }
@keyframes findPop {
  0%   { transform:scale(1); opacity:1; }
  40%  { transform:scale(1.3); opacity:1; }
  100% { transform:scale(0); opacity:0; }
}
.find-item.found { animation:findPop .45s ease forwards; pointer-events:none; }
@keyframes findShake {
  0%,100% { transform:translateX(0); }
  20%     { transform:translateX(-6px); }
  40%     { transform:translateX(6px); }
  60%     { transform:translateX(-4px); }
  80%     { transform:translateX(4px); }
}
.find-item.wrong { animation:findShake .4s ease; }
.find-round { font-size:var(--sm); font-weight:800; color:var(--muted); }

@media (min-width:600px) {
  .find-item     { width:100px; height:100px; }
  .find-item svg { width:76px; height:76px; }
}
@media (min-width:1024px) {
  .find-item     { width:110px; height:110px; }
  .find-item svg { width:86px; height:86px; }
}
</style>
</head>

<span class="corner-deco tr" id="dc2">⭐</span>

<div id="sFlash">

<div class="mf-overlay" id="homeOverlay"></div>

];

  { pt:'surpreso',  en:'surprised', pt_m:'surpreso',  pt_f:'surpresa'  },
];

function buildPhrase(ci, ei, lang) {
  const c = CHARS[ci], e = EMOTIONS[ei];
  if (lang === 'pt') return c.art + ' ' + c.pt + ' está ' + (c.gen === 'm' ? e.pt_m : e.pt_f);

/* ═══════════════════════════════════════════════
   NAV overrides
═══════════════════════════════════════════════ */
Nav.startGame = function(lang) {
  this._applyLang(lang);
  document.getElementById('navLangBadge').style.display = '';
  if (this.currentGame === 'flash') {
    this._show('sFlash');
    FlashGame.start(lang);
  } else if (this.currentGame === 'click') {
    this._show('sClick');
    ClickGame.start(lang);
  } else if (this.currentGame === 'find') {
    this._show('sFind');
    FindGame.start(lang);
  }
};

Nav.restartGame = function() {
  document.getElementById('sCelebrate').classList.remove('show');
  if (this.currentGame === 'flash') {
    this._show('sFlash');
    FlashGame.start(FlashGame.lang);
  } else if (this.currentGame === 'click') {
    this._show('sClick');
    ClickGame.start(ClickGame.lang);
  } else if (this.currentGame === 'find') {
    this._show('sFind');
    FindGame.start(FindGame.lang);
  }
};

Nav._applyLang = function(lang) {
  const L = LANG[lang];
  const set = (id, txt) => { const el = document.getElementById(id); if (el) el.textContent = txt; };
  document.documentElement.dataset.country = L.country;
  document.documentElement.lang = lang === 'pt' ? 'pt-BR' : 'en';
  set('navTitle',       L.navTitle);
  set('navLangBadge',   L.navBadge);
  set('hubSub',         L.hubSub);
  set('hubFlash',       L.hubFlash);
  set('badgeFlash',     L.badgeFlash);
  set('hubClicar',      L.hubClicar);
  set('badgeClicar',    L.badgeClicar);
  set('flashBackLabel', L.flashBackLabel);
  set('flashTapHint',   L.flashTapHint);
  set('clickBackLabel', L.clickBackLabel);
  set('hubFind',        L.hubFind);
  set('badgeFind',      L.badgeFind);
  set('findBackLabel',  L.findBackLabel);
  set('btnRestart',     L.restart);
  set('btnBackHub',     L.backHub);
  this._setCorners(L.corners);
  TTS.setLang(L.tts);
};

/* ═══════════════════════════════════════════════
   FLASH GAME — 8 combos (2 chars × 4 emoções)
═══════════════════════════════════════════════ */
const FlashGame = {
  lang:'pt', step:0, flipped:false, encCount:0,
  sequence:[],

  start(lang) {
    this.lang = lang;
    this.step = 0;
    this.flipped = false;
    this.encCount = 0;
    const combos = [];
    for (let c = 0; c < CHARS.length; c++)
      for (let e = 0; e < EMOTIONS.length; e++)
        combos.push([c, e]);
    this.sequence = shuffle(combos);
    TTS.init();
    this._render();
  },

  _render() {
    const [ci, ei] = this.sequence[this.step];
    const L     = LANG[this.lang];
    const phrase = buildPhrase(ci, ei, this.lang);
    const svg   = getSvg(ci, ei);

    document.getElementById('flashCard3d').classList.toggle('flipped', this.flipped);
    /* Fundo pastel discreto — não compete com a ilustração */
    document.getElementById('flashFront').style.background = CHARS[ci].pastel;
    document.getElementById('flashEmoji').innerHTML = svg;
    document.getElementById('flashBackEmoji').innerHTML = svg;
    document.getElementById('flashName').textContent = phrase;

    const total = this.sequence.length;
    document.getElementById('flashProgress').textContent = (this.step + 1) + ' / ' + total;
    document.getElementById('flashBar').style.width = (((this.step + 1) / total) * 100) + '%';
    document.getElementById('flashPrev').disabled = this.step === 0;

    TTS.speak(L.flashQuestion);
  },

  flip() {
    this.flipped = !this.flipped;
    document.getElementById('flashCard3d').classList.toggle('flipped', this.flipped);
    if (this.flipped) {
      const [ci, ei] = this.sequence[this.step];
      const phrase = buildPhrase(ci, ei, this.lang);
      SFX.playCorrect();
      TTS.speakExcitedAndWait(phrase + '!');
      this.encCount++;
      if (this.encCount % 3 === 0) {
        const enc = LANG[this.lang].encourage[Math.floor(Math.random() * LANG[this.lang].encourage.length)];
        this._encourage(enc);
      }
    } else {
      TTS.speak(LANG[this.lang].flashQuestion);
    }
  },

  next() {
    speechSynthesis && speechSynthesis.cancel();
    if (this.step >= this.sequence.length - 1) { this._celebrate(); return; }
    this.step++; this.flipped = false; this._render();
  },

  prev() {
    if (this.step <= 0) return;
    speechSynthesis && speechSynthesis.cancel();
    this.step--; this.flipped = false; this._render();
  },

  _celebrate() {
    const L = LANG[this.lang];
    speechSynthesis && speechSynthesis.cancel();
    setTimeout(() => TTS.speak(L.flashCelSpoken), 400);
    document.getElementById('celTitle').textContent   = L.celTitle;
    document.getElementById('celSub').textContent     = L.flashCelSub;
    document.getElementById('btnRestart').textContent = L.restart;
    document.getElementById('btnBackHub').textContent = L.backHub;
    localStorage.setItem('emotions_flash_progresso', JSON.stringify({
      completed:true, date:new Date().toISOString()
    }));
    Nav._show('sCelebrate');
  },

  _encourage(enc) {
    const t = document.getElementById('encToast');
    t.textContent = enc.text;
    t.classList.add('show');
    setTimeout(() => TTS.speak(enc.spoken), 1400);
    setTimeout(() => t.classList.remove('show'), 3200);
  }
};

/* ═══════════════════════════════════════════════
   CLICK GAME — "Quem está triste?"
   3 opções misturando chars e emoções
═══════════════════════════════════════════════ */
const ClickGame = {
  lang:'pt', step:0, totalSteps:5, _locked:false,
  _rounds:[],

  start(lang) {
    this.lang = lang;
    this.step = 0;
    this._locked = false;
    this._buildRounds();
    TTS.init();
    this._render();
  },

  _buildRounds() {
    this._rounds = [];
    const emoSeq = shuffle([0,1,2,3,0]); /* 5 rodadas: todas as 4 emoções + 1 repetição */
    for (let r = 0; r < this.totalSteps; r++) {
      const targetEmo = emoSeq[r];
      const correctChar = Math.floor(Math.random() * CHARS.length);
      const correctOpt = { ci: correctChar, ei: targetEmo };
      const otherEmos = shuffle([0,1,2,3].filter(e => e !== targetEmo));
      let oi = 0;
      const wrongOpts = [
        { ci: Math.floor(Math.random() * CHARS.length), ei: otherEmos[oi++] },
        { ci: Math.floor(Math.random() * CHARS.length), ei: otherEmos[oi++] },
      ];
      const allOpts = shuffle([correctOpt, ...wrongOpts]);
      const correctIdx = allOpts.indexOf(correctOpt);
      this._rounds.push({ targetEmo, options: allOpts, correctIdx });
    }
  },

  _render() {
    const round = this._rounds[this.step];
    const L = LANG[this.lang];
    const emo = EMOTIONS[round.targetEmo];

    document.getElementById('clickRoundBadge').textContent =
      (this.step + 1) + ' / ' + this.totalSteps;

    const emoWord = this.lang === 'pt' ? emo.pt : emo.en;
    document.getElementById('clickInstruction').textContent = L.clickCmd + ' ' + emoWord + '?';

    const optionsEl = document.getElementById('clickOptions');
    optionsEl.innerHTML = '';
    round.options.forEach((opt, i) => {
      const btn = document.createElement('button');
      btn.className = 'click-opt';
      btn.innerHTML = getSvg(opt.ci, opt.ei);

      const xOv = document.createElement('span');
      xOv.className = 'x-overlay';
      xOv.textContent = '✖';
      btn.appendChild(xOv);

      btn.addEventListener('click', () => {
        if (this._locked) return;
        if (i === round.correctIdx) this._onCorrect(opt.ci, opt.ei);
        else                        this._onWrong(btn);
      });
      optionsEl.appendChild(btn);
    });

    setTimeout(() => TTS.speak(L.clickCmd + ' ' + emoWord), 250);
  },

  _onCorrect(ci, ei) {
    this._locked = true;
    const L = LANG[this.lang];
    const phrase = buildPhrase(ci, ei, this.lang);
    const enc = L.encourage[Math.floor(Math.random() * L.encourage.length)];
    SFX.playCorrect();
    const t = document.getElementById('encToast');
    t.textContent = enc.text;
    t.classList.add('show');
    setTimeout(() => TTS.speak(phrase + '! ' + enc.spoken), 200);
    setTimeout(() => t.classList.remove('show'), 3800);
    setTimeout(() => {
      this._locked = false;
      this.step++;
      if (this.step >= this.totalSteps) this._celebrate();
      else                              this._render();
    }, 3500);
  },

  _onWrong(btn) {
    SFX.playWrong();
    btn.classList.add('wrong');
    setTimeout(() => btn.classList.remove('wrong'), 720);
  },

  _celebrate() {
    const L = LANG[this.lang];
    speechSynthesis && speechSynthesis.cancel();
    setTimeout(() => TTS.speak(L.clickCelSpoken), 400);
    document.getElementById('celTitle').textContent   = L.celTitle;
    document.getElementById('celSub').textContent     = L.clickCelSub;
    document.getElementById('btnRestart').textContent = L.restart;
    document.getElementById('btnBackHub').textContent = L.backHub;
    localStorage.setItem('emotions_click_progresso', JSON.stringify({
      completed:true, date:new Date().toISOString()
    }));
    Nav._show('sCelebrate');
  },
};

/* ═══════════════════════════════════════════════
   FIND GAME — "Quem está feliz?" (2 corretos + 4 distratores)
═══════════════════════════════════════════════ */
const FindGame = {
  lang:'pt', step:0, totalSteps:4, remaining:0, _locked:false, _seq:[],

  start(lang){
    this.lang=lang; this.step=0; this._locked=false;
    this._seq=shuffle([0,1,2,3]);
    TTS.init(); this._render();
  },

  _render(){
    const ei=this._seq[this.step], L=LANG[this.lang];
    const emo=EMOTIONS[ei];
    const name=this.lang==='pt'?emo.pt:emo.en;
    document.getElementById('findRoundBadge').textContent=(this.step+1)+' / '+this.totalSteps;

    const miniSvg='<span style="display:inline-block;width:28px;height:28px;vertical-align:middle;">'+getSvg(0,ei)+'</span>';
    if(this.lang==='pt'){
      document.getElementById('findInstruction').innerHTML=
        L.findCmd+' <span class="find-target-word">'+miniSvg+' '+name+'</span>?';
    } else {
      document.getElementById('findInstruction').innerHTML=
        L.findCmd+' <span class="find-target-word">'+miniSvg+' '+name+'</span>?';
    }

    /* 2 corretos (menino+menina com emoção alvo) + 4 distratores */
    const items=[];
    items.push({ci:0,ei:ei}); items.push({ci:1,ei:ei});
    const otherEmos=shuffle([0,1,2,3].filter(e=>e!==ei));
    for(let d=0;d<4;d++) items.push({ci:Math.floor(Math.random()*2),ei:otherEmos[d%otherEmos.length]});
    const shuffled=shuffle(items);
    const grid=document.getElementById('findGrid'); grid.innerHTML='';
    this.remaining=2;
    shuffled.forEach(item=>{
      const el=document.createElement('div'); el.className='find-item';
      el.dataset.emoIdx=item.ei;
      el.innerHTML=getSvg(item.ci,item.ei);
      el.addEventListener('click',()=>{
        if(this._locked)return;
        parseInt(el.dataset.emoIdx)===ei?this._onCorrect(el):this._onWrong(el);
      });
      grid.appendChild(el);
    });
    setTimeout(()=>TTS.speak((this.lang==='pt'?'Quem está ':'Who is ')+name),250);
  },

  _onCorrect(el){
    el.classList.add('found'); SFX.playCorrect();
    this.remaining--;
    if(this.remaining<=0){
      this._locked=true;
      setTimeout(()=>{
        const L=LANG[this.lang],enc=L.encourage[Math.floor(Math.random()*L.encourage.length)];
        const t=document.getElementById('encToast');t.textContent=enc.text;t.classList.add('show');
        TTS.speak(enc.spoken);
        setTimeout(()=>t.classList.remove('show'),3200);
        setTimeout(()=>{this._locked=false;this.step++;this.step>=this.totalSteps?this._celebrate():this._render();},3000);
      },500);
    }
  },

  _onWrong(el){SFX.playWrong();el.classList.add('wrong');setTimeout(()=>el.classList.remove('wrong'),450);},

  _celebrate(){
    const L=LANG[this.lang]; speechSynthesis&&speechSynthesis.cancel();
    setTimeout(()=>TTS.speak(L.findCelSpoken),400);
    document.getElementById('celTitle').textContent=L.celTitle;
    document.getElementById('celSub').textContent=L.findCelSub;
    document.getElementById('btnRestart').textContent=L.restart;
    document.getElementById('btnBackHub').textContent=L.backHub;
    localStorage.setItem('emotions_find_progresso',JSON.stringify({completed:true,date:new Date().toISOString()}));
    Nav._show('sCelebrate');
  },
};

/* ── BOOT ── */
MF.currentGameId = 'emotions';
Nav.boot(['sHub','sLang','sFlash','sClick','sFind','sCelebrate']);
