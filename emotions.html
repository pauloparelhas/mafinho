<!DOCTYPE html>
<html lang="pt" data-theme="light" data-country="br">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"/>
<title>Emoções — Mafinho v2</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap"
      rel="stylesheet" media="print" onload="this.media='all'"/>
<link rel="stylesheet" href="base.css"/>
<style>
/* ═══════════════════════════════════════════
   CSS ESPECÍFICO — emotions.html
═══════════════════════════════════════════ */
.hub-hero { border-bottom-color:var(--c-pink); }
.game-card.ready { border-color:var(--c-pink); }

/* ── TELA C: Flashcard ── */
#sFlash {
  flex:1; display:none; flex-direction:column;
  align-items:center; padding:20px 16px 32px; gap:0;
}
.card-row   { display:flex; align-items:center; gap:14px; width:100%; max-width:520px; }
.card-scene { flex:1; height:320px; perspective:1000px; min-width:0; }
.card-3d {
  width:100%; height:100%; position:relative;
  transform-style:preserve-3d; transition:transform .5s;
  cursor:pointer; border-radius:28px;
}
.card-3d.flipped { transform:rotateY(180deg); }
.card-face {
  position:absolute; inset:0;
  backface-visibility:hidden; -webkit-backface-visibility:hidden;
  border-radius:28px; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:14px; padding:24px;
}
.card-back  { transform:rotateY(180deg); background:var(--surface); border:5px solid var(--border); }
.card-emoji      { font-size:7rem; line-height:1; user-select:none; }
.card-emoji svg  { width:140px; height:140px; }
.click-opt svg   { width:80px; height:80px; }

@media (min-width:600px) {
  .card-emoji svg  { width:200px; height:200px; }
  .click-opt       { width:140px; height:140px; }
  .click-opt svg   { width:100px; height:100px; }
}
@media (min-width:1024px) {
  .card-emoji svg  { width:240px; height:240px; }
  .card-scene      { height:400px; }
  .click-opt       { width:170px; height:170px; }
  .click-opt svg   { width:120px; height:120px; }
}
.card-tap-hint   { font-size:var(--sm); font-weight:700; opacity:0.75; text-align:center; color:inherit; }
.card-back-name  { font-size:2rem; font-weight:900; text-align:center; line-height:1.2; }
.flash-progress  { font-size:var(--sm); font-weight:800; color:var(--muted); text-align:center; margin-top:16px; }
#sFlash .card-nav { max-width:520px; }
#sFlash .progress-bar-wrap { max-width:520px; }

/* ── TELA D: Clicar ── */
#sClick {
  flex:1; display:none; flex-direction:column;
  align-items:center; padding:12px 12px 8px; gap:10px;
}
#sClick .back-link { margin-bottom:0; }
.click-instruction {
  font-size:var(--xl); font-weight:900; text-align:center;
  color:var(--country-accent);
}
.click-options {
  display:flex; gap:14px; justify-content:center;
  width:100%; max-width:420px;
}
.click-opt {
  width:110px; height:110px; border:none; border-radius:var(--radlg);
  font-size:4.5rem; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  background:var(--surface); border:4px solid var(--border);
  box-shadow:0 4px 16px rgba(0,0,0,0.15);
  position:relative; overflow:hidden;
  -webkit-tap-highlight-color:transparent;
  transition:transform .12s;
}
.click-opt:active { transform:scale(0.94); }
.click-opt .x-overlay {
  position:absolute; inset:0; background:rgba(0,0,0,0.55);
  display:flex; align-items:center; justify-content:center;
  font-size:3rem; color:white; border-radius:inherit;
  opacity:0; pointer-events:none;
}
@keyframes xShake {
  0%  { transform:translate(0,0) rotate(0deg); opacity:1; }
  15% { transform:translate(-10px,0) rotate(-7deg); }
  30% { transform:translate(10px,0)  rotate(7deg); }
  45% { transform:translate(-8px,0)  rotate(-5deg); }
  60% { transform:translate(8px,0)   rotate(5deg); }
  75% { transform:translate(-4px,0)  rotate(-2deg); }
  88% { opacity:1; }
  100%{ transform:translate(0,0) rotate(0deg); opacity:0; }
}
.click-opt.wrong .x-overlay { opacity:1; animation:xShake .7s ease; }
.click-round { font-size:var(--sm); font-weight:800; color:var(--muted); }
</style>

<body>

<div class="theme-stripe"></div>
<span class="corner-deco tl" id="dc1">⭐</span>
<span class="corner-deco tr" id="dc2">⭐</span>
<span class="corner-deco bl" id="dc3">⭐</span>

<!-- ═══ TELA A: Hub ═══ -->

<!-- ═══ TELA B: Idioma ═══ -->
<div id="sLang">

<!-- ═══ TELA C: Flashcard ═══ -->
<div id="sFlash">

<!-- ═══ TELA D: Clicar ═══ -->

function buildPhrase(ci, ei, lang) {
  const c = CHARS[ci], e = EMOTIONS[ei];
  if (lang === 'pt') {
    const adj = c.gen === 'm' ? e.pt_m : e.pt_f;
    return c.art + ' ' + c.pt + ' está ' + adj;

function buildSvg(ci, ei) {
  return '<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">' +
    CHAR_BASES[ci] + EMOTION_FACES[ei] + '</svg>';
}

function buildAllCombos() {
  const combos = [];
  for (let c = 0; c < CHARS.length; c++)
    for (let e = 0; e < EMOTIONS.length; e++)
      combos.push([c, e]);
  return combos;
}

Nav.startGame = function(lang) {
  this._applyLang(lang);
  document.getElementById('navLangBadge').style.display = '';
  if (this.currentGame === 'flash') {
    this._show('sFlash');
    FlashGame.start(lang);
  } else if (this.currentGame === 'click') {
    this._show('sClick');
    ClickGame.start(lang);
  }
};

Nav.restartGame = function() {
  document.getElementById('sCelebrate').classList.remove('show');
  if (this.currentGame === 'flash') {
    this._show('sFlash');
    FlashGame.start(FlashGame.lang);
  } else if (this.currentGame === 'click') {
    this._show('sClick');
    ClickGame.start(ClickGame.lang);
  }
};

Nav._applyLang = function(lang) {
  const L = LANG[lang];
  const set = (id, txt) => { const el = document.getElementById(id); if (el) el.textContent = txt; };
  document.documentElement.dataset.country = L.country;
  document.documentElement.lang = lang === 'pt' ? 'pt-BR' : 'en';
  set('navTitle',       L.navTitle);
  set('navLangBadge',   L.navBadge);
  set('hubSub',         L.hubSub);
  set('hubFlash',       L.hubFlash);
  set('badgeFlash',     L.badgeFlash);
  set('hubClicar',      L.hubClicar);
  set('badgeClicar',    L.badgeClicar);
  set('flashBackLabel', L.flashBackLabel);
  set('flashTapHint',   L.flashTapHint);
  set('clickBackLabel', L.clickBackLabel);
  set('btnRestart',     L.restart);
  set('btnBackHub',     L.backHub);
  this._setCorners(L.corners);
  TTS.setLang(L.tts);
};

/* ═══════════════════════════════════════════════
   FLASH GAME — Flashcard de emoções
   Mostra personagem + emoção → criança toca → ouve a frase
═══════════════════════════════════════════════ */
const FlashGame = {
  lang:'pt', step:0, flipped:false, encCount:0,
  sequence:[],

  start(lang) {
    this.lang = lang;
    this.step = 0;
    this.flipped = false;
    this.encCount = 0;
    this.sequence = shuffle(buildAllCombos());
    TTS.init();
    this._render();
  },

  _render() {
    const [ci, ei] = this.sequence[this.step];
    const color = CHARS[ci].color;
    const L     = LANG[this.lang];
    const phrase = buildPhrase(ci, ei, this.lang);
    const svg   = buildSvg(ci, ei);

    document.getElementById('flashCard3d').classList.toggle('flipped', this.flipped);
    document.getElementById('flashFront').style.background = color;
    document.getElementById('flashEmoji').innerHTML = svg;
    document.getElementById('flashBackEmoji').innerHTML = svg;
    document.getElementById('flashName').textContent = phrase;

    const total = this.sequence.length;
    document.getElementById('flashProgress').textContent = (this.step + 1) + ' / ' + total;
    document.getElementById('flashBar').style.width = (((this.step + 1) / total) * 100) + '%';
    document.getElementById('flashPrev').disabled = this.step === 0;

    TTS.speak(L.flashQuestion);
  },

  flip() {
    this.flipped = !this.flipped;
    document.getElementById('flashCard3d').classList.toggle('flipped', this.flipped);
    if (this.flipped) {
      const [ci, ei] = this.sequence[this.step];
      const phrase = buildPhrase(ci, ei, this.lang);
      SFX.playCorrect();
      TTS.speakExcitedAndWait(phrase + '!');
      this.encCount++;
      if (this.encCount % 3 === 0) {
        const enc = LANG[this.lang].encourage[Math.floor(Math.random() * LANG[this.lang].encourage.length)];
        this._encourage(enc);
      }
    } else {
      TTS.speak(LANG[this.lang].flashQuestion);
    }
  },

  next() {
    speechSynthesis && speechSynthesis.cancel();
    if (this.step >= this.sequence.length - 1) { this._celebrate(); return; }
    this.step++; this.flipped = false; this._render();
  },

  prev() {
    if (this.step <= 0) return;
    speechSynthesis && speechSynthesis.cancel();
    this.step--; this.flipped = false; this._render();
  },

  _celebrate() {
    const L = LANG[this.lang];
    speechSynthesis && speechSynthesis.cancel();
    setTimeout(() => TTS.speak(L.flashCelSpoken), 400);
    document.getElementById('celTitle').textContent   = L.celTitle;
    document.getElementById('celSub').textContent     = L.flashCelSub;
    document.getElementById('btnRestart').textContent = L.restart;
    document.getElementById('btnBackHub').textContent = L.backHub;
    localStorage.setItem('emotions_flash_progresso', JSON.stringify({
      completed:true, date:new Date().toISOString()
    }));
    Nav._show('sCelebrate');
  },

  _encourage(enc) {
    const t = document.getElementById('encToast');
    t.textContent = enc.text;
    t.classList.add('show');
    setTimeout(() => TTS.speak(enc.spoken), 1400);
    setTimeout(() => t.classList.remove('show'), 3200);
  }
};

/* ═══════════════════════════════════════════════
   CLICK GAME — Quem está com essa emoção?
   Mostra 3 personagens com emoções diferentes.
   Criança toca o que tem a emoção pedida.
═══════════════════════════════════════════════ */
const ClickGame = {
  lang:'pt', step:0, totalSteps:5, _locked:false,
  _rounds:[],

  start(lang) {
    this.lang = lang;
    this.step = 0;
    this._locked = false;
    this._buildRounds();
    TTS.init();
    this._render();
  },

  _buildRounds() {
    this._rounds = [];
    const emoSeq = shuffle([...Array(EMOTIONS.length).keys()]);
    for (let r = 0; r < this.totalSteps; r++) {
      const targetEmo = emoSeq[r % emoSeq.length];
      const charPool = shuffle([...Array(CHARS.length).keys()]).slice(0, 3);
      const correctIdx = Math.floor(Math.random() * 3);
      const otherEmos = shuffle(
        [...Array(EMOTIONS.length).keys()].filter(e => e !== targetEmo)
      );
      let oi = 0;
      const options = charPool.map((ci, i) => ({
        ci,
        ei: i === correctIdx ? targetEmo : otherEmos[oi++]
      }));
      this._rounds.push({ targetEmo, options, correctIdx });
    }
  },

  _render() {
    const round = this._rounds[this.step];
    const L = LANG[this.lang];
    const emo = EMOTIONS[round.targetEmo];

    document.getElementById('clickRoundBadge').textContent =
      (this.step + 1) + ' / ' + this.totalSteps;

    const emoWord = this.lang === 'pt' ? emo.pt : emo.en;
    const instruction = L.clickCmd + ' ' + emoWord + '?';
    const spoken = L.clickCmd + ' ' + emoWord;
    document.getElementById('clickInstruction').textContent = instruction;

    const optionsEl = document.getElementById('clickOptions');
    optionsEl.innerHTML = '';
    round.options.forEach((opt, i) => {
      const btn = document.createElement('button');
      btn.className = 'click-opt';
      btn.innerHTML = buildSvg(opt.ci, opt.ei);

      const xOv = document.createElement('span');
      xOv.className = 'x-overlay';
      xOv.textContent = '✖';
      btn.appendChild(xOv);

      btn.addEventListener('click', () => {
        if (this._locked) return;
        if (i === round.correctIdx) this._onCorrect(opt.ci, opt.ei);
        else                        this._onWrong(btn);
      });
      optionsEl.appendChild(btn);
    });

    setTimeout(() => TTS.speak(spoken), 250);
  },

  _onCorrect(ci, ei) {
    this._locked = true;
    const L = LANG[this.lang];
    const phrase = buildPhrase(ci, ei, this.lang);
    const enc = L.encourage[Math.floor(Math.random() * L.encourage.length)];
    SFX.playCorrect();
    const t = document.getElementById('encToast');
    t.textContent = enc.text;
    t.classList.add('show');
    setTimeout(() => TTS.speak(phrase + '! ' + enc.spoken), 200);
    setTimeout(() => t.classList.remove('show'), 3800);
    setTimeout(() => {
      this._locked = false;
      this.step++;
      if (this.step >= this.totalSteps) this._celebrate();
      else                              this._render();
    }, 3500);
  },

  _onWrong(btn) {
    SFX.playWrong();
    btn.classList.add('wrong');
    setTimeout(() => btn.classList.remove('wrong'), 720);
  },

  _celebrate() {
    const L = LANG[this.lang];
    speechSynthesis && speechSynthesis.cancel();
    setTimeout(() => TTS.speak(L.clickCelSpoken), 400);
    document.getElementById('celTitle').textContent   = L.celTitle;
    document.getElementById('celSub').textContent     = L.clickCelSub;
    document.getElementById('btnRestart').textContent = L.restart;
    document.getElementById('btnBackHub').textContent = L.backHub;
    localStorage.setItem('emotions_click_progresso', JSON.stringify({
      completed:true, date:new Date().toISOString()
    }));
    Nav._show('sCelebrate');
  },
};
